# ─────────────────────────────────────────────────────────────────────────────
# Parser: docker
#
# Interpreta as linhas do log do Docker daemon:
#   {"log":"...", "stream":"stdout", "time":"2024-01-01T00:00:00Z"}
# ─────────────────────────────────────────────────────────────────────────────
[PARSER]
    Name        docker
    Format      json
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%LZ
    Time_Keep   On

# ─────────────────────────────────────────────────────────────────────────────
# Parser: json
#
# Interpreta o campo "log" emitido pelo Serilog (JSON estruturado).
# Usado pelo FILTER parser para promover os campos ao nível raiz.
# ─────────────────────────────────────────────────────────────────────────────
[PARSER]
    Name        json
    Format      json
    Time_Key    Timestamp
    Time_Format %Y-%m-%dT%H:%M:%S.%L%z
    Time_Keep   On
