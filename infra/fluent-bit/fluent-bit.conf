[SERVICE]
    # Intervalo de flush para o output (segundos)
    Flush                    5
    Daemon                   Off
    Log_Level                info
    Parsers_File             parsers.conf

    # Buffer em disco — logs sobrevivem a quedas do Elasticsearch
    storage.type             filesystem
    storage.path             /fluent-bit/buffer
    storage.sync             normal
    storage.checksum         off
    # Limite total do buffer em disco
    storage.total_limit_size 1G
    storage.max_chunks_up    128

# ─────────────────────────────────────────────────────────────────────────────
# INPUT — leitura dos logs gerados pelo Docker
#
# O Docker escreve os logs de cada container em:
#   /var/lib/docker/containers/<id>/<id>-json.log
#
# O parser "docker" extrai os campos: log, stream, time
# As aplicações emitem JSON estruturado via Serilog no campo "log"
# ─────────────────────────────────────────────────────────────────────────────
[INPUT]
    Name              tail
    Path              /var/lib/docker/containers/*/*.log
    Parser            docker
    Tag               docker.*
    Refresh_Interval  5
    Mem_Buf_Limit     50MB
    Skip_Long_Lines   On
    # Buffer em disco para este input
    storage.type      filesystem

# ─────────────────────────────────────────────────────────────────────────────
# FILTER — parse do JSON interno (Serilog)
#
# O campo "log" contém o JSON emitido pelo Serilog.
# Este filtro faz o parse desse JSON aninhado, promovendo seus campos
# ao nível raiz do evento (Reserve_Data preserva os campos originais).
# ─────────────────────────────────────────────────────────────────────────────
[FILTER]
    Name         parser
    Match        docker.*
    Key_Name     log
    Parser       json
    Reserve_Data On

# ─────────────────────────────────────────────────────────────────────────────
# OUTPUT — Elasticsearch 8.x
#
# Logstash_Format cria índices com data: cashflow-logs-YYYY.MM.DD
# Suppress_Type_Name é obrigatório para ES 8.x (sem suporte a _type)
# Retry_Limit False: tenta indefinidamente até entregar (resiliência)
# ─────────────────────────────────────────────────────────────────────────────
[OUTPUT]
    Name                  es
    Match                 *
    Host                  elasticsearch
    Port                  9200
    HTTP_User             elastic
    HTTP_Passwd           changeme
    tls                   Off
    Logstash_Format       On
    Logstash_Prefix       cashflow-logs
    Logstash_DateFormat   %Y.%m.%d
    Suppress_Type_Name    On
    # Usa buffer em disco herdado do INPUT para resiliência
    storage.total_limit_size 1G
    Retry_Limit           False
