# Ingress — TLS e anotações dependem do controlador (nginx, GKE, etc.).
# Ajuste o host e a classe antes de aplicar em produção.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: arch-challenge-api
  namespace: arch-challenge
  labels:
    app.kubernetes.io/part-of: cashflow-platform
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  rules:
    - host: api.arch-challenge.example
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  name: http
  # tls:
  #   - hosts:
  #       - api.arch-challenge.example
  #     secretName: arch-challenge-api-tls
