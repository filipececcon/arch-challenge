apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cashflow-api
  namespace: arch-challenge
  labels:
    app.kubernetes.io/name: cashflow-api
    app.kubernetes.io/part-of: cashflow-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cashflow-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
