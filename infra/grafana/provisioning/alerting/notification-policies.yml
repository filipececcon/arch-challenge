apiVersion: 1

policies:
  - orgId: 1
    receiver: cashflow-webhook
    group_by: ["alertname", "service"]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: cashflow-webhook
        matchers:
          - severity = critical
        group_wait: 10s
        repeat_interval: 1h
      - receiver: cashflow-webhook
        matchers:
          - severity = warning
        group_wait: 1m
        repeat_interval: 6h
